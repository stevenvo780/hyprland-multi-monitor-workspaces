# Carga plugin compilado localmente y aplica límites por monitor.
exec-once = ~/.config/hypr/scripts/load-split-plugin.sh

# Reemplaza binds globales por binds por monitor del plugin.
unbind = $mainMod, 1
unbind = $mainMod, 2
unbind = $mainMod, 3
unbind = $mainMod, 4
unbind = $mainMod, 5
unbind = $mainMod, 6
unbind = $mainMod, 7
unbind = $mainMod, 8
unbind = $mainMod, 9
unbind = $mainMod, 0

unbind = $mainMod SHIFT, 1
unbind = $mainMod SHIFT, 2
unbind = $mainMod SHIFT, 3
unbind = $mainMod SHIFT, 4
unbind = $mainMod SHIFT, 5
unbind = $mainMod SHIFT, 6
unbind = $mainMod SHIFT, 7
unbind = $mainMod SHIFT, 8
unbind = $mainMod SHIFT, 9
unbind = $mainMod SHIFT, 0

unbind = $mainMod, mouse_down
unbind = $mainMod, mouse_up

bind = $mainMod, 1, exec, ~/.config/hypr/scripts/split-dispatch-strict.sh switch 1
bind = $mainMod, 2, exec, ~/.config/hypr/scripts/split-dispatch-strict.sh switch 2
bind = $mainMod, 3, exec, ~/.config/hypr/scripts/split-dispatch-strict.sh switch 3
bind = $mainMod, 4, exec, ~/.config/hypr/scripts/split-dispatch-strict.sh switch 4
bind = $mainMod, 5, exec, ~/.config/hypr/scripts/split-dispatch-strict.sh switch 5
bind = $mainMod, 6, exec, ~/.config/hypr/scripts/split-dispatch-strict.sh switch 6
bind = $mainMod, 7, exec, ~/.config/hypr/scripts/split-dispatch-strict.sh switch 7
bind = $mainMod, 8, exec, ~/.config/hypr/scripts/split-dispatch-strict.sh switch 8
bind = $mainMod, 9, exec, ~/.config/hypr/scripts/split-dispatch-strict.sh switch 9
bind = $mainMod, 0, exec, ~/.config/hypr/scripts/split-dispatch-strict.sh switch 10

bind = $mainMod SHIFT, 1, exec, ~/.config/hypr/scripts/split-dispatch-strict.sh move 1
bind = $mainMod SHIFT, 2, exec, ~/.config/hypr/scripts/split-dispatch-strict.sh move 2
bind = $mainMod SHIFT, 3, exec, ~/.config/hypr/scripts/split-dispatch-strict.sh move 3
bind = $mainMod SHIFT, 4, exec, ~/.config/hypr/scripts/split-dispatch-strict.sh move 4
bind = $mainMod SHIFT, 5, exec, ~/.config/hypr/scripts/split-dispatch-strict.sh move 5
bind = $mainMod SHIFT, 6, exec, ~/.config/hypr/scripts/split-dispatch-strict.sh move 6
bind = $mainMod SHIFT, 7, exec, ~/.config/hypr/scripts/split-dispatch-strict.sh move 7
bind = $mainMod SHIFT, 8, exec, ~/.config/hypr/scripts/split-dispatch-strict.sh move 8
bind = $mainMod SHIFT, 9, exec, ~/.config/hypr/scripts/split-dispatch-strict.sh move 9
bind = $mainMod SHIFT, 0, exec, ~/.config/hypr/scripts/split-dispatch-strict.sh move 10

# Control dinámico de capacidad local por monitor:
# Super+Ctrl+=  -> incrementar
# Super+Ctrl+-  -> reducir
# Super+Ctrl+/  -> mostrar estado
# Super+Ctrl+0  -> reset monitor actual (default 2/3/4)
# Super+Ctrl+Shift+0 -> reset global
bind = $mainMod CTRL, equal, exec, ~/.config/hypr/scripts/split-limit-adjust.sh inc
bind = $mainMod CTRL, minus, exec, ~/.config/hypr/scripts/split-limit-adjust.sh dec
bind = $mainMod CTRL, slash, exec, ~/.config/hypr/scripts/split-limit-adjust.sh show
bind = $mainMod CTRL, 0, exec, ~/.config/hypr/scripts/split-limit-adjust.sh reset-monitor
bind = $mainMod CTRL SHIFT, 0, exec, ~/.config/hypr/scripts/split-limit-adjust.sh reset-all
