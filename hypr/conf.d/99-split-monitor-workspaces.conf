# Carga plugin compilado localmente y aplica límites por monitor.
exec-once = ~/.config/hypr/scripts/load-split-plugin.sh

# Reemplaza binds globales por binds por monitor del plugin.
unbind = $mainMod, 1
unbind = $mainMod, 2
unbind = $mainMod, 3
unbind = $mainMod, 4
unbind = $mainMod, 5
unbind = $mainMod, 6
unbind = $mainMod, 7
unbind = $mainMod, 8
unbind = $mainMod, 9
unbind = $mainMod, 0

unbind = $mainMod SHIFT, 1
unbind = $mainMod SHIFT, 2
unbind = $mainMod SHIFT, 3
unbind = $mainMod SHIFT, 4
unbind = $mainMod SHIFT, 5
unbind = $mainMod SHIFT, 6
unbind = $mainMod SHIFT, 7
unbind = $mainMod SHIFT, 8
unbind = $mainMod SHIFT, 9
unbind = $mainMod SHIFT, 0

unbind = $mainMod, mouse_down
unbind = $mainMod, mouse_up

bind = $mainMod, 1, exec, hyprctl dispatch split-workspace 1
bind = $mainMod, 2, exec, hyprctl dispatch split-workspace 2
bind = $mainMod, 3, exec, hyprctl dispatch split-workspace 3
bind = $mainMod, 4, exec, hyprctl dispatch split-workspace 4

bind = $mainMod SHIFT, 1, exec, hyprctl dispatch split-movetoworkspacesilent 1
bind = $mainMod SHIFT, 2, exec, hyprctl dispatch split-movetoworkspacesilent 2
bind = $mainMod SHIFT, 3, exec, hyprctl dispatch split-movetoworkspacesilent 3
bind = $mainMod SHIFT, 4, exec, hyprctl dispatch split-movetoworkspacesilent 4
